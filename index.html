  <script>
    (function() {
      var form = document.getElementById('newsletter-form');
      var submitBtn = document.getElementById('newsletter-submit');
      var status = document.getElementById('newsletter-status');

      function showStatus(message, isError) {
        status.textContent = message;
        status.className = 'newsletter-status ' + (isError ? 'newsletter-status-error' : 'newsletter-status-success');
      }

      form.addEventListener('submit', function(e) {
        e.preventDefault();

        var email = form.querySelector('[name="email"]').value.trim();
        if (!email) { showStatus('Please enter your email address.', true); return; }
        if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { showStatus('Please enter a valid email address.', true); return; }

        submitBtn.disabled = true;
        submitBtn.textContent = 'Subscribing...';
        status.className = 'newsletter-status hidden';

        var formData = new FormData(form);
        var body = {};
        formData.forEach(function(value, key) { body[key] = value; });

        fetch('/api/newsletter', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        })
        .then(function(response) {
          return response.json().then(function(result) {
            if (response.ok && result.success) {
              showStatus("You're subscribed! We'll let you know when we open.", false);
              form.reset();
              if (window.turnstile) window.turnstile.reset();
            } else {
              showStatus(result.error || 'Something went wrong. Please try again.', true);
            }
          });
        })
        .catch(function() {
          showStatus('Network error. Please check your connection and try again.', true);
        })
        .finally(function() {
          submitBtn.disabled = false;
          submitBtn.textContent = 'Subscribe';
        });
      });
    })();
  </script>
